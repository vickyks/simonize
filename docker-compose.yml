version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: simonizer
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: simonizer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U simonizer"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://simonizer:${DB_PASSWORD:-password}@db:5432/simonizer
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-simon}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-me-in-production}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
