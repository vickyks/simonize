name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Lint
        run: ruff check backend

      - name: Test
        run: PYTHONPATH=backend pytest backend

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck

      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose file
        run: DB_PASSWORD=password SECRET_KEY=change-me-in-production ADMIN_USERNAME=simon ADMIN_PASSWORD=change-me-in-production NGINX_HTTP_PORT=80 docker compose config

      - name: Validate production compose file
        run: |
          NGINX_HTTP_PORT=127.0.0.1:8082 docker compose -f docker-compose.yml -f docker-compose.prod.yml config > /tmp/prod-compose.yml
          grep -Eq '127\.0\.0\.1:8082|host_ip: 127\.0\.0\.1' /tmp/prod-compose.yml
          grep -Eq '127\.0\.0\.1:8082|published: "?8082"?' /tmp/prod-compose.yml

      - name: Build images
        run: DB_PASSWORD=password SECRET_KEY=change-me-in-production ADMIN_USERNAME=simon ADMIN_PASSWORD=change-me-in-production NGINX_HTTP_PORT=80 docker compose build backend frontend

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DROPLET_SSH_KEY }}

      - name: Add droplet to known hosts
        run: ssh-keyscan -H ${{ secrets.DROPLET_HOST }} >> ~/.ssh/known_hosts

      - name: Verify SSH connection
        run: ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} "echo 'SSH connection successful'"

      - name: Deploy on droplet
        run: |
          ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} << 'EOF'
            set -euo pipefail
            cd /home/vicky/simonize

            echo "Pulling latest main..."
            git fetch origin main
            git reset --hard origin/main

            echo "Checking production environment..."
            ./scripts/check-production-env.sh .env

            echo "Building production images..."
            NGINX_HTTP_PORT=127.0.0.1:8082 docker-compose -f docker-compose.yml -f docker-compose.prod.yml build

            echo "Ensuring database is running..."
            NGINX_HTTP_PORT=127.0.0.1:8082 docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d db

            echo "Waiting for database readiness..."
            for i in $(seq 1 30); do
              if NGINX_HTTP_PORT=127.0.0.1:8082 docker-compose -f docker-compose.yml -f docker-compose.prod.yml exec -T db pg_isready -U simonizer; then
                break
              fi
              sleep 2
              if [ "$i" = "30" ]; then
                echo "Database did not become ready in time"
                exit 1
              fi
            done

            echo "Running database migrations..."
            NGINX_HTTP_PORT=127.0.0.1:8082 docker-compose -f docker-compose.yml -f docker-compose.prod.yml run --rm backend sh -c "PYTHONPATH=. alembic upgrade head"

            echo "Starting production stack..."
            NGINX_HTTP_PORT=127.0.0.1:8082 docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            echo "Smoke checking Simonizer..."
            curl -fsS http://127.0.0.1:8082/api/health

            echo "Deployment complete."
          EOF

      - name: Deployment diagnostics
        if: always()
        run: |
          ssh ${{ secrets.DROPLET_USER }}@${{ secrets.DROPLET_HOST }} << 'EOF'
            cd /home/vicky/simonize || exit 0
            echo "=== Production services ==="
            NGINX_HTTP_PORT=127.0.0.1:8082 docker-compose -f docker-compose.yml -f docker-compose.prod.yml ps || true
            echo "=== Recent nginx logs ==="
            NGINX_HTTP_PORT=127.0.0.1:8082 docker-compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=40 nginx || true
            echo "=== Recent backend logs ==="
            NGINX_HTTP_PORT=127.0.0.1:8082 docker-compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=40 backend || true
          EOF

      - name: Deployment summary
        if: always()
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Host**: ${{ secrets.DROPLET_HOST }}" >> $GITHUB_STEP_SUMMARY
